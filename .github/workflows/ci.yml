name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            kouten_lib: libkoutendb.so
          - os: macos-latest
            kouten_lib: libkoutendb.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Rust driver
        uses: actions/checkout@v4

      - name: Checkout KoutenDB core
        uses: actions/checkout@v4
        with:
          repository: puffball1567/koutendb
          path: koutendb-core

      - name: Install Nim on Linux
        if: runner.os == 'Linux'
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"

      - name: Install Nim on macOS
        if: runner.os == 'macOS'
        run: brew install nim

      - name: Install libsodium on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev

      - name: Install libsodium on macOS
        if: runner.os == 'macOS'
        run: brew install libsodium

      - name: Configure macOS libsodium paths
        if: runner.os == 'macOS'
        run: |
          prefix="$(brew --prefix libsodium)"
          echo "LIBRARY_PATH=$prefix/lib:$LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "CPATH=$prefix/include:$CPATH" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$prefix/lib:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Build KoutenDB C ABI
        run: |
          cd koutendb-core
          nimble install -y
          nim c --app:lib -d:release --nimcache:/tmp/nimcache_kouten_capi -o:lib/${{ matrix.kouten_lib }} src/koutendb_capi.nim

      - name: Test Rust driver
        run: cargo test
        env:
          KOUTENDB_CORE_DIR: ${{ github.workspace }}/koutendb-core
          LD_LIBRARY_PATH: ${{ github.workspace }}/koutendb-core/lib
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/koutendb-core/lib
